<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Disease Detector</title>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef7ee;
    text-align: center;
    margin: 0;
    padding: 0;
}
h2 {
    background: #2e7d32;
    color: white;
    padding: 15px;
    margin: 0;
}
button {
    padding: 12px 25px;
    margin: 15px;
    background: #2e7d32;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}
button:hover {
    background: #1b5e20;
}
#webcam-container canvas {
    margin-top: 10px;
    border: 3px solid #2e7d32;
    border-radius: 10px;
}
.status {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}
.healthy { color: #2e7d32; }
.diseased { color: #c62828; }
</style>
</head>

<body>

<h2>🌿 Plant Disease Detector</h2>

<button onclick="init()">Start Camera</button>

<div id="webcam-container"></div>
<div id="label-container"></div>
<div id="statusBox" class="status">Waiting for prediction...</div>

<script>
/* ================= CONFIG ================= */
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/RGtjOUpV1/";

/* ================= GLOBALS ================= */
let model, webcam, labelContainer, maxPredictions;
let lastSpokenResult = "";
let stableCounter = 0;

/* ================= INIT ================= */
async function init() {

    const modelURL = MODEL_URL + "model.json";
    const metadataURL = MODEL_URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(500, 500, true);// ✅ Webcam size increased here (300 → 500)
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";
    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
    }
}

/* ================= LOOP ================= */
async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

/* ================= PREDICT ================= */
async function predict() {

    const predictions = await model.predict(webcam.canvas);

    let best = predictions[0];
    for (let i = 0; i < predictions.length; i++) {
        labelContainer.childNodes[i].innerHTML =
            predictions[i].className + ": " +
            (predictions[i].probability * 100).toFixed(1) + "%";

        if (predictions[i].probability > best.probability) {
            best = predictions[i];
        }
    }

    // Confidence threshold (80%)
    if (best.probability < 0.8) return;

    if (best.className === lastSpokenResult) {
        stableCounter++;
    } else {
        stableCounter = 0;
    }

    // Speak only after stable frames
    if (stableCounter === 12) {
        updateStatus(best.className);
    }

    lastSpokenResult = best.className;
}

/* ================= STATUS + VOICE ================= */
function updateStatus(result) {

    const box = document.getElementById("statusBox");
    let message = "";

    if (result.toLowerCase().includes("healthy")) {
        message = "The plant is healthy";
        box.className = "status healthy";
        box.innerText = "✅ " + message;
    } else {
        message = "The plant is diseased";
        box.className = "status diseased";
        box.innerText = "⚠️ " + message;
    }

    speak(message);
}

function speak(text) {
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    utterance.rate = 1;
    utterance.pitch = 1;

    window.speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
